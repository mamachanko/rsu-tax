<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RSU Tax Calculator</title>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"
          integrity="sha384-HGfztofotfshcF7+8n44JQL2oJmowVChPTg48S+jvZoztPfvwD79OC/LTtG6dMp+"
          crossorigin="anonymous"></script>
  <style>
    /* ── Design tokens ───────────────────────────────────────────────── */
    :root {
      --bg:          #0f1117;
      --surface:     #1a1d27;
      --surface-2:   #222533;
      --border:      #2e3147;
      --text:        #e2e4ef;
      --text-muted:  #7b7f9e;
      --accent:      #6c8cff;
      --accent-dim:  #3d5acc;
      --gain:        #3ecf8e;
      --loss:        #f56565;
      --warn:        #f6ad55;
      --radius:      8px;
      --font:        "Inter", "Segoe UI", system-ui, sans-serif;
      --mono:        "JetBrains Mono", "Fira Code", ui-monospace, monospace;
    }

    /* ── Reset & base ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.55;
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Layout ──────────────────────────────────────────────────────── */
    .app-shell {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 100vh;
    }
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--surface);
    }
    header .logo {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    header .logo span { color: var(--accent); }
    header .tagline {
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
      width: 100%;
    }
    footer {
      border-top: 1px solid var(--border);
      padding: 0.75rem 2rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* ── Cards ───────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }
    .card-title {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    /* ── Buttons ─────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4em;
      padding: 0.45em 1em;
      border-radius: 6px;
      border: none;
      font: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity .15s, background .15s;
      text-decoration: none;
    }
    .btn:hover { opacity: .85; }
    .btn-primary { background: var(--accent-dim); color: #fff; }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { background: var(--surface-2); }
    .btn-sm { padding: 0.3em 0.75em; font-size: 0.78rem; }

    /* ── Status badges ───────────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 0.15em 0.5em;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-pass { background: rgba(62,207,142,.15); color: var(--gain); }
    .badge-warn { background: rgba(246,173,85,.15);  color: var(--warn); }
    .badge-fail { background: rgba(245,101,101,.15); color: var(--loss); }

    /* ── Amount colouring ────────────────────────────────────────────── */
    .gain   { color: var(--gain); }
    .loss   { color: var(--loss); }
    .neutral { color: var(--text-muted); }

    /* ── Tables ──────────────────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    thead th {
      background: var(--surface-2);
      color: var(--text-muted);
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.55rem 0.75rem;
      text-align: left;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }
    thead th.num { text-align: right; }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface-2); }
    tbody td {
      padding: 0.5rem 0.75rem;
      white-space: nowrap;
      font-family: var(--mono);
      font-size: 0.78rem;
    }
    tbody td.text { font-family: var(--font); }
    tbody td.num  { text-align: right; }
    tr.stc { opacity: .65; }

    /* ── HTMX indicators ─────────────────────────────────────────────── */
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline-flex; }
    .htmx-request.htmx-indicator { display: inline-flex; }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Misc ────────────────────────────────────────────────────────── */
    .gap-1 { gap: 0.5rem; }
    .gap-2 { gap: 1rem; }
    .flex   { display: flex; }
    .flex-wrap { flex-wrap: wrap; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 1rem; }
    .mt-4 { margin-top: 2rem; }
    .mb-1 { margin-bottom: 0.5rem; }
    .mb-2 { margin-bottom: 1rem; }
    .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<div class="app-shell">
  <header>
    <div class="logo">RSU <span>Tax</span></div>
    <div class="tagline">Capital gains calculator · Abgeltungssteuer</div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>
    Exchange rates from <a href="https://www.ecb.europa.eu" target="_blank" rel="noopener">ECB</a>
    via <a href="https://www.frankfurter.app" target="_blank" rel="noopener">Frankfurter API</a> ·
    Data stays on your machine
  </footer>
</div>
</body>
</html>
